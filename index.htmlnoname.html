<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>फाइल अनलॉक करें | Free Download Link</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        /* 1. टॉप बैनर ऐड की जगह */
        .top-ad-zone {
            width: 100%;
            max-width: 728px;
            height: 90px;
            background-color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #334155;
            color: #64748b;
            font-size: 14px;
        }
        .main-box {
            background-color: #1e293b;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 340px;
            border: 1px solid #334155;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 24px;
        }
        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.5;
        }
        .action-btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transition: 0.3s ease;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }
        /* 2. बॉटम बैनर ऐड की जगह */
        .bottom-ad-zone {
            width: 100%;
            max-width: 300px;
            height: 250px;
            background-color: #1e293b;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #334155;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="top-ad-zone">
        बैनर विज्ञापन यहाँ दिखेगा (728x90)
    </div>

    <div class="main-box" onclick="triggerPopUnder()">
        <h2>आपकी फाइल तैयार है!</h2>
        <p>नीचे दिए गए बटन पर क्लिक करके अपनी प्रीमियम फाइल या लिंक को तुरंत अनलॉक करें।</p>
        
        <button class="action-btn">यहाँ क्लिक करके अनलॉक करें</button>
    </div>

    <div class="bottom-ad-zone">
        बैनर विज्ञापन यहाँ दिखेगा (300x250)
    </div>

    <script>
        function triggerPopUnder() {
            // ─── पॉप-अप / डायरेक्ट लिंक ऐड का लॉजिक ───
            // जब यूज़र इस बॉक्स में या बटन पर कहीं भी क्लिक करेगा, तो नए टैब में विज्ञापन खुल जाएगा।
            // नीचे 'https://www.example.com' को हटाकर अपनी विज्ञापन कंपनी का 'Direct Link' पेस्ट कर दें।
            window.open('https://www.example.com', '_blank');
        }
    </script>

</body>
</html>
